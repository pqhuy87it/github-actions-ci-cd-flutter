# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.x'

jobs:
  # ===========================================
  # Job 1: Analyze, Lint, Format
  # ===========================================
  analyze:
    name: 🔍 Analyze & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      # Code generation (freezed + riverpod_generator)
      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      # Verify generated files are committed
      - name: Check generated files
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "❌ Generated files are out of date!"
            echo "Run: dart run build_runner build --delete-conflicting-outputs"
            echo ""
            echo "Changed files:"
            git diff --name-only
            exit 1
          fi
          echo "✅ Generated files are up to date"

      # Static analysis
      - name: Flutter analyze
        run: flutter analyze --fatal-infos

      # Riverpod-specific lint rules
      - name: Custom lint (riverpod_lint)
        run: dart run custom_lint

      # Format check
      - name: Check formatting
        run: dart format --set-exit-if-changed .

  # ===========================================
  # Job 2: Unit & Widget Tests
  # ===========================================
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosheep/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      # Run all tests with coverage
      - name: Run tests
        run: |
          flutter test \
            --coverage \
            --test-randomize-ordering-seed=random \
            --reporter=github

      # Coverage threshold check
      - name: Check coverage (min 60%)
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "⚠️ No coverage file found"
            exit 0
          fi

          TOTAL=$(grep -c "^DA:" coverage/lcov.info || echo 0)
          HIT=$(grep "^DA:" coverage/lcov.info | grep -cv ",0$" || echo 0)

          if [ "$TOTAL" -eq 0 ]; then
            echo "⚠️ No coverage data"
            exit 0
          fi

          PCT=$(( HIT * 100 / TOTAL ))
          echo "📊 Coverage: ${PCT}% (${HIT}/${TOTAL} lines)"

          if [ "$PCT" -lt 60 ]; then
            echo "❌ Coverage ${PCT}% is below 60% threshold"
            exit 1
          fi
          echo "✅ Coverage OK"

      # Upload coverage (optional — cần CODECOV_TOKEN secret)
      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # ===========================================
  # Job 3: Build (verify compilable)
  # ===========================================
  build:
    name: 🏗️ Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: test
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android-apk
            runner: ubuntu-latest
            build_cmd: flutter build apk --debug
          - platform: ios
            runner: macos-latest
            build_cmd: flutter build ios --no-codesign --debug
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosheep/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java (Android only)
        if: contains(matrix.platform, 'android')
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Upload build artifact
        if: contains(matrix.platform, 'android')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 3