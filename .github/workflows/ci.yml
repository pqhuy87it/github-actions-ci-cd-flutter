# .github/workflows/ci.yml
name: Flutter CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.27.x'
  JAVA_VERSION: '17'

jobs:
  # ============================================================
  # Stage 1: Analyze & Lint
  # ============================================================
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosheep/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true # Cache Flutter SDK

      # Cache pub dependencies
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      # ---- Riverpod code generation (nếu dùng riverpod_generator) ----
      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      # Verify generated files are committed (optional nhưng recommended)
      - name: Check generated files are up-to-date
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Generated files are out of date. Run 'dart run build_runner build' and commit."
            git diff --name-only
            exit 1
          fi

      # ---- Static analysis ----
      - name: Analyze code
        run: flutter analyze --fatal-infos

      # ---- Custom lint rules (custom_lint cho riverpod_lint) ----
      - name: Run custom lint
        run: dart run custom_lint
        # riverpod_lint cung cấp lint rules riêng:
        #   - missing provider scope
        #   - unnecessary rebuilds
        #   - provider naming conventions

      # ---- Formatting ----
      - name: Check formatting
        run: dart format --set-exit-if-changed .

  # ============================================================
  # Stage 2: Unit & Widget Tests
  # ============================================================
  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosheep/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      # ---- Run tests with coverage ----
      - name: Run tests
        run: |
          flutter test \
            --coverage \
            --test-randomize-ordering-seed=random \
            --reporter=github

      # ---- Coverage enforcement ----
      - name: Check coverage threshold
        run: |
          # Parse lcov.info for line coverage
          TOTAL_LINES=$(grep -c "^DA:" coverage/lcov.info || echo 0)
          HIT_LINES=$(grep "^DA:" coverage/lcov.info | grep -v ",0$" | wc -l || echo 0)
          
          if [ "$TOTAL_LINES" -eq 0 ]; then
            echo "::warning::No coverage data found"
            exit 0
          fi
          
          COVERAGE=$(( HIT_LINES * 100 / TOTAL_LINES ))
          echo "Coverage: ${COVERAGE}%"
          
          THRESHOLD=70
          if [ "$COVERAGE" -lt "$THRESHOLD" ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      # ---- Upload coverage report ----
      - name: Upload coverage to Codecov
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================
  # Stage 3: Integration Tests (chạy trên emulator)
  # ============================================================
  integration_test:
    name: Integration Tests
    runs-on: macos-latest # Cần macOS cho iOS simulator
    needs: analyze
    timeout-minutes: 30
    strategy:
      matrix:
        platform: [android, ios]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosheep/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java (Android)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      # ---- Android Emulator ----
      - name: Run integration tests (Android)
        if: matrix.platform == 'android'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            flutter test integration_test \
              --flavor staging \
              -d emulator-5554

      # ---- iOS Simulator ----
      - name: Run integration tests (iOS)
        if: matrix.platform == 'ios'
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j \
            | jq -r '.devices | to_entries[] | .value[] | select(.name == "iPhone 16") | .udid' \
            | head -1)
          xcrun simctl boot "$DEVICE_ID"
          flutter test integration_test -d "$DEVICE_ID"

  # ============================================================
  # Stage 4: Build Artifacts
  # ============================================================
  build:
    name: Build ${{ matrix.platform }}
    needs: [test, integration_test]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            runner: ubuntu-latest
          - platform: ios
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosheep/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java (Android)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      # ---- Inject environment config ----
      - name: Create .env
        run: |
          cat <<EOF > .env
          API_BASE_URL=${{ secrets.API_BASE_URL_STAGING }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          EOF

      # ---- Android Build ----
      - name: Build APK (Android)
        if: matrix.platform == 'android'
        run: |
          flutter build apk \
            --flavor staging \
            --release \
            --build-number=${{ github.run_number }} \
            --dart-define-from-file=.env \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: Build App Bundle (Android)
        if: matrix.platform == 'android'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          
          flutter build appbundle \
            --flavor staging \
            --release \
            --build-number=${{ github.run_number }} \
            --dart-define-from-file=.env \
            --obfuscate \
            --split-debug-info=build/debug-info

      # ---- iOS Build ----
      - name: Install Apple certificates
        if: matrix.platform == 'ios'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      - name: Install provisioning profile
        if: matrix.platform == 'ios'
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" \
            | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build IPA (iOS)
        if: matrix.platform == 'ios'
        run: |
          flutter build ipa \
            --flavor staging \
            --release \
            --build-number=${{ github.run_number }} \
            --dart-define-from-file=.env \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --export-options-plist=ios/ExportOptions.plist

      # ---- Upload build artifacts ----
      - name: Upload Android artifacts
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            build/app/outputs/flutter-apk/app-staging-release.apk
            build/app/outputs/bundle/stagingRelease/*.aab
          retention-days: 7

      - name: Upload iOS artifacts
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/ipa/*.ipa
          retention-days: 7

      # ---- Upload debug symbols (Sentry/Crashlytics) ----
      - name: Upload debug symbols
        run: |
          # Sentry example
          npx @sentry/cli upload-dif build/debug-info \
            --org ${{ secrets.SENTRY_ORG }} \
            --project ${{ secrets.SENTRY_PROJECT }} \
            --auth-token ${{ secrets.SENTRY_AUTH_TOKEN }}